name: Build Ultra Linux ISO
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y mtools xorriso debootstrap squashfs-tools grub-pc-bin grub-efi-amd64-bin

      - name: Build Base System
        run: |
          mkdir -p chroot
          sudo debootstrap --variant=minbase --arch=amd64 stable chroot http://deb.debian.org/debian/
          # تجهيز بيئة النظام الداخلي
          sudo mount --bind /dev chroot/dev
          sudo mount -t proc /proc chroot/proc
          sudo mount -t sysfs /sys chroot/sys
          # ضبط اليوزر والباسورد (اليوزر: admin | الباسورد: admin)
          sudo chroot chroot /bin/bash -c "useradd -m -s /bin/bash admin && echo 'admin:admin' | chpasswd"
          sudo chroot chroot /bin/bash -c "echo 'root:admin' | chpasswd"

      - name: Inject UI and Scripts
        run: |
          [ -f .jwmrc ] && sudo cp .jwmrc chroot/etc/skel/ || echo "Warning: .jwmrc missing"
          [ -f install.sh ] && sudo cp install.sh chroot/root/ || echo "Error: install.sh missing"
          # سطر التشغيل التلقائي للواجهة عند الدخول
          sudo bash -c "echo 'if [[ -z \$DISPLAY && \$XDG_VTNR -eq 1 ]]; then exec startx; fi' >> chroot/etc/skel/.bash_profile"
          # تنفيذ سكريبت التثبيت الداخلي
          if [ -f chroot/root/install.sh ]; then
            sudo chroot chroot /bin/bash -c "chmod +x /root/install.sh && /root/install.sh"
          fi

      - name: Clean Up Mounts
        run: |
          sudo umount chroot/sys || true
          sudo umount chroot/proc || true
          sudo umount chroot/dev || true

      - name: Create ISO Image
        run: |
          mkdir -p output
          sudo grub-mkrescue -o output/Ultra-Linux.iso chroot

      - name: Upload Finished ISO
        uses: actions/upload-artifact@v4
        with:
          name: Ultra-Linux-ISO
          path: output/Ultra-Linux.iso
